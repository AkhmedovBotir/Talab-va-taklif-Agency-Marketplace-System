# contragent.ttsa.uz — Expo static dist uchun
# Ubuntu: /etc/nginx/sites-available/contragent.ttsa.uz
#
# Muammo: /ombor yangilanganda 301 -> /ombor/ -> 403
# Sabab: dist da ombor.html VA ombor/ papkasi bor; nginx papkani .html dan oldin tanlaydi.
# Yechim: try_files da $uri.html ni $uri/ dan OLDIN; trailing slash ni olib tashlash.

server {
    listen 80;
    listen [::]:80;
    server_name contragent.ttsa.uz;

    # SSL bo'lsa certbot qo'shilgan blokni saqlang; root va location / ni shu qoidalar bilan yangilang.
    # listen 443 ssl http2;
    # ssl_certificate ...;

    root /var/www/kontragent/dist;
    index index.html;

    # /ombor/ kabi trailing slash -> /ombor (papka 403 emas, .html ishlaydi)
    rewrite ^(.+)/$ $1 permanent;

    # Eski havolalar
    rewrite ^/\(tabs\)/?(.*)$ /$1 permanent;

    location /_expo/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        # DIQQAT: $uri/ qo'shmang — ombor/ papkasi ombor.html dan ustun bo'ladi va 403 beradi
        try_files $uri $uri.html /index.html;
    }
}
